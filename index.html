<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferdal Turan Photography</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:white;
  text-align:center;
}

nav {
  padding:20px;
  border-bottom:1px solid gold;
}

h1 {
  color:gold;
  margin-top:40px;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
  padding:20px;
}

.gallery img {
  width:100%;
  border-radius:10px;
  cursor:pointer;
}

button {
  padding:10px;
  margin-top:10px;
  background:gold;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<nav>
  <h2>Ferdal Photography</h2>
</nav>

<h1>Müşteri Galerisi</h1>

<div class="gallery" id="gallery"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKNbeHty0yjzH_lMZ-Lzc12vmosd1hYPk",
  authDomain: "ferdal-photography.firebaseapp.com",
  projectId: "ferdal-photography",
  storageBucket: "ferdal-photography.firebasestorage.app",
  messagingSenderId: "5929525949",
  appId: "1:5929525949:web:40af107495b60176820dd4",
  measurementId: "G-CVCBV5XS3N"
};

initializeApp(firebaseConfig);

// TEST FOTO (şimdilik)
const images = [
  "https://picsum.photos/400/300?1",
  "https://picsum.photos/400/300?2",
  "https://picsum.photos/400/300?3"
];

const gallery = document.getElementById("gallery");

images.forEach(src => {
  const div = document.createElement("div");

  const img = document.createElement("img");
  img.src = src;

  const btn = document.createElement("button");
  btn.innerText = "Seç";

  btn.onclick = () => {
    alert("Seçildi ✔️");
  };

  div.appendChild(img);
  div.appendChild(btn);
  gallery.appendChild(div);
});
</script>

</body>
</html>
