<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferdal Turan Photography</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:white;
}
nav {
  padding:15px;
  border-bottom:1px solid gold;
  display:flex;
  justify-content:space-between;
}
button {
  background:gold;
  border:none;
  padding:10px;
  cursor:pointer;
}
.page { display:none; padding:20px; }
.active { display:block; }
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:10px;
}
.gallery img {
  width:100%;
  border-radius:10px;
  cursor:pointer;
}
.selected {
  border:3px solid gold;
}
</style>
</head>

<body>

<nav>
  <div>Ferdal Photography</div>
  <div>
    <button onclick="showPage('home')">Forside</button>
    <button onclick="showPage('galleryPage')">Galleri</button>
    <button onclick="showPage('admin')">Admin</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">
  <h1>Velkommen</h1>
  <p>Ferdal Turan Photography</p>
</div>

<!-- GALLERY -->
<div id="galleryPage" class="page">
  <h2>Galleri adgang</h2>
  <input id="codeInput" placeholder="Indtast kode">
  <button onclick="loadGallery()">Åbn</button>
  <div class="gallery" id="gallery"></div>
</div>

<!-- ADMIN -->
<div id="admin" class="page">
  <h2>Upload billeder</h2>
  <input type="text" id="albumCode" placeholder="Kode">
  <input type="file" id="fileInput" multiple>
  <button onclick="upload()">Upload</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL, listAll } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBKNbeHty0yjzH_lMZ-Lzc12vmosd1hYPk",
  authDomain: "ferdal-photography.firebaseapp.com",
  projectId: "ferdal-photography",
  storageBucket: "ferdal-photography.firebasestorage.app",
  messagingSenderId: "5929525949",
  appId: "1:5929525949:web:40af107495b60176820dd4",
  measurementId: "G-CVCBV5XS3N"
};

const app = initializeApp(firebaseConfig);
const storage = getStorage(app);

window.showPage = (id)=>{
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

window.upload = async ()=>{
  const files = document.getElementById('fileInput').files;
  const code = document.getElementById('albumCode').value;

  if(!code) return alert("Kod gir");

  for(let f of files){
    const storageRef = ref(storage, code + "/" + f.name);
    await uploadBytes(storageRef, f);
  }

  alert("Yüklendi ✔️");
}

window.loadGallery = async ()=>{
  const code = document.getElementById('codeInput').value;
  const listRef = ref(storage, code);

  const gallery = document.getElementById('gallery');
  gallery.innerHTML="";

  try{
    const res = await listAll(listRef);

    res.items.forEach(async item=>{
      const url = await getDownloadURL(item);

      const img = document.createElement('img');
      img.src = url;

      img.onclick = ()=>{
        img.classList.toggle('selected');
      }

      gallery.appendChild(img);
    });

  }catch{
    alert("Kod bulunamadı");
  }
}
</script>

</body>
</html>
